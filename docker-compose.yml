services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ballgame}
      POSTGRES_USER: ${POSTGRES_USER:-ballgame}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ballgame} -d ${POSTGRES_DB:-ballgame}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  django:
    build: ./app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ballgame}
      POSTGRES_USER: ${POSTGRES_USER:-ballgame}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_HOST: postgres
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost} localhost 127.0.0.1
      DJANGO_DEBUG: "False"
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost}
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build: ./app/ballgame
    ports:
      - "80:80"
    depends_on:
      - django
    restart: unless-stopped

volumes:
  postgres_data:
